name: Run Tests Using Jest

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: |
          cd sample-app
          npm install

      - run: |
          cd sample-app
          npm test